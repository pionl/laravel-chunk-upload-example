services:
  laravel:
    image: i-chunk-laravel:${IMAGE_VERSION}-${LARAVEL_VERSION}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        IMAGE_VERSION: "${IMAGE_VERSION}"
        LARAVEL_VERSION: "${LARAVEL_VERSION}"
    environment:
      LOG_CHANNEL: stderr
      LOG_STACK: stderr
      LOG_LEVEL: debug
    command: php /app/${LARAVEL_VERSION}/artisan serve --host=0.0.0.0 --port=8000
